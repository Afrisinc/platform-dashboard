services:
  afrisinc-web:
    image: afrisinc-web:latest
    container_name: afrisinc-web-local
    ports:
      - "8017:8017"
    environment:
      - NODE_ENV=production
      - API_URL=${API_URL:-http://localhost:8091}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8017"]
      interval: 30s
      timeout: 10s
      retries: 3
